{% extends "base.html" %}

{% block main_content %}
    {{ post_macros::page_header(title=taxonomy.name) }}
    <main class="list">
        <ul>
        {%- for term in terms %}
            <section class="list-item">
                <h1 class="title">
                    <a href={{ term.path }}>{{term.name}}</a>
                </h1>
            </section>
        {% endfor -%}
        </ul>
    </main>
{% endblock main_content %}
