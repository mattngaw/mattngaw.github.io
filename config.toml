# The URL the site will be built for
base_url = "https://mattngaw.com"
title = "mattngaw"
build_search_index = true
generate_feed = true
compile_sass = true
minify_html = true
output_dir = "docs"

theme = "apollo"

[markdown]
# Whether to do syntax highlighting
# Theme can be customised by setting the `highlight_theme` variable to a theme supported by Zola
highlight_code = true
highlight_theme = "ayu-dark"

render_emoji = false

external_links_target_blank = false

[extra]
# Put all your custom variables here
menu = [
    { name = "/dialogue", url = "/dialogue", weight = 1 },
    { name = "/projects", url = "/projects", weight = 2 },
    { name = "/about", url = "/about", weight = 3 },
]

socials = [
    { name = "twitter", url = "https://twitter.com/mattngaw", icon = "twitter" },
    { name = "github", url = "https://github.com/mattngaw", icon = "github" },
]

taxonomies = [
    { name = "tag", feed = true},
    { name = "year", feed = true},
]

theme = "auto"

toc = true

[slugify]
paths = "on"
taxonomies = "on"